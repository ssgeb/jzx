services:
  mysql:
    image: mysql:8.4
    container_name: doorhandle-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: doorhandle-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_ADMIN_ENABLE: "true"
      NACOS_AUTH_CONSOLE_ENABLE: "true"
      NACOS_AUTH_SYSTEM_TYPE: nacos
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    ports:
      - "8088:8080"
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos_data:/home/nacos/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -X POST http://127.0.0.1:8848/nacos/v3/auth/user/admin
          -d "password=$$NACOS_PASSWORD" >/dev/null 2>&1 || true;
          curl -fsS -X POST http://127.0.0.1:8848/nacos/v3/auth/user/login
          -d "username=$$NACOS_USERNAME&password=$$NACOS_PASSWORD" | grep -q '"accessToken"' &&
          curl -fsS http://127.0.0.1:8080/v3/console/health/readiness | grep -q '"data":"ok"'
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 40s

  sentinel-dashboard:
    build:
      context: ./sentinel
      args:
        SENTINEL_VERSION: 1.8.9
    image: doorhandle/sentinel-dashboard:1.8.9
    container_name: doorhandle-sentinel
    restart: unless-stopped
    ports:
      - "8858:8858"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'echo > /dev/tcp/127.0.0.1/8858'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  seata-server:
    build:
      context: ./seata
      args:
        MYSQL_CONNECTOR_VERSION: 9.1.0
    image: doorhandle/seata-server:2.5.0-jdk21-mysql9.1.0
    container_name: doorhandle-seata
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      SEATA_IP: seata-server
      SEATA_PORT: 8091
      LOADER_PATH: /seata-server/libs
      STORE_MODE: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
    ports:
      - "8091:8091"
    volumes:
      - ./seata/application.yml:/seata-server/resources/application.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/8091'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  kafka:
    image: apache/kafka:3.8.1
    container_name: doorhandle-kafka
    restart: unless-stopped
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:29092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 8s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: doorhandle-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mysql_data:
  nacos_data:
  kafka_data:
  redis_data:
