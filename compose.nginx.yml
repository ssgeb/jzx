name: doorhandlecatch

x-backend-service: &backend-service
  build:
    context: .
    dockerfile: deploy/backend/Dockerfile
  env_file:
    - ${DOORHANDLE_ENV_FILE:-deploy/docker.env.example}
  environment:
    SERVER_PORT: 8080
  expose:
    - "8080"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - doorhandle-runtime:/app/uploads
  networks:
    - doorhandle-network
  restart: unless-stopped

services:
  backend-1:
    <<: *backend-service
  backend-2:
    <<: *backend-service

volumes:
  doorhandle-runtime:

networks:
  doorhandle-network:
    driver: bridge
