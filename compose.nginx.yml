name: doorhandlecatch

x-backend-service: &backend-service
  build:
    context: .
    dockerfile: deploy/backend/Dockerfile
  env_file:
    - ${DOORHANDLE_ENV_FILE:-deploy/docker.env.example}
  environment:
    SERVER_PORT: 8080
  expose:
    - "8080"
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - doorhandle-runtime:/app/uploads
  networks:
    - doorhandle-network
  restart: unless-stopped

services:
  backend-1:
    <<: *backend-service
  backend-2:
    <<: *backend-service
  python-assistant:
    build:
      context: .
      dockerfile: python_assistant_service/Dockerfile
    env_file:
      - ${DOORHANDLE_ENV_FILE:-deploy/docker.env.example}
    environment:
      ASSISTANT_HOST: 0.0.0.0
      ASSISTANT_PORT: 8090
      JAVA_AGENT_TOOL_BASE_URL: http://nginx:8081
      ASSISTANT_SKILLS_ROOT: /app/runtime/assistant-skills
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      nginx:
        condition: service_healthy
    volumes:
      - assistant-skills:/app/runtime/assistant-skills
    networks:
      - doorhandle-network
    restart: unless-stopped
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
    expose:
      - "8081"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    networks:
      - doorhandle-network
    restart: unless-stopped

volumes:
  doorhandle-runtime:
  assistant-skills:

networks:
  doorhandle-network:
    driver: bridge
